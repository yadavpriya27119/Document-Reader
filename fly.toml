# Fly.io: install CLI https://fly.io/docs/hands-on/install-flyctl/
# Then: fly auth login && fly launch --no-deploy
# Set secrets: fly secrets set GEMINI_API_KEY=... PINECONE_API_KEY=...
# Deploy: fly deploy
app = "document-reader-app"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
